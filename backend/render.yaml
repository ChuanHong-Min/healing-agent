# Render 部署配置
services:
  - type: web
    name: healing-agent-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_API_BASE
        value: https://apis.iflow.cn/v1
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
