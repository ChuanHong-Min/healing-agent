<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI治愈心理智能体 💚</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
  body { font-family: 'Noto Sans SC', sans-serif; background: #f8fffe; }
  .chat-bubble-user { background: linear-gradient(135deg, #6ee7b7, #34d399); border-radius: 18px 18px 4px 18px; }
  .chat-bubble-ai { background: #ffffff; border: 1px solid #d1fae5; border-radius: 18px 18px 18px 4px; box-shadow: 0 2px 8px rgba(52,211,153,.12); }
  .gradient-bg { background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf9 50%, #fefce8 100%); }
  .btn-primary { background: linear-gradient(135deg, #34d399, #059669); transition: all .25s; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(52,211,153,.4); }
  .btn-secondary { background: #f0fdf4; border: 1.5px solid #34d399; color: #065f46; transition: all .25s; }
  .btn-secondary:hover, .btn-secondary.selected { background: linear-gradient(135deg, #34d399, #059669); color: white; border-color: transparent; }
  .step-dot { transition: all .3s; }
  .typing-dot { animation: bounce 1.2s infinite; background: #34d399; border-radius: 50%; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  #chat-messages { scroll-behavior: smooth; }
</style>
</head>
<body class="min-h-screen gradient-bg">

<div id="page-welcome" class="min-h-screen flex flex-col items-center justify-center px-4">
  <div class="text-center max-w-sm">
    <div class="text-6xl mb-4">🌿</div>
    <h1 class="text-3xl font-bold text-emerald-800 mb-2">AI 治愈心理智能体</h1>
    <p class="text-emerald-600 mb-2">你的专属情绪陪伴，随时倾听，不评判</p>
    <p class="text-xs text-gray-400 mb-8">无需注册 · 即开即用</p>
    <button onclick="showPage('page-onboard')" class="btn-primary text-white px-10 py-3 rounded-full font-medium text-lg w-full mb-3">开始设定陪伴 ✨</button>
    <button onclick="quickStart()" class="btn-secondary px-10 py-3 rounded-full font-medium w-full">直接开始聊天（使用默认设定）</button>
  </div>
</div>

<div id="page-onboard" class="hidden min-h-screen flex-col items-center justify-start px-4 pt-10 pb-20">
  <div class="flex items-center gap-2 mb-8">
    <div id="dot-1" class="step-dot w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-sm font-bold">1</div>
    <div class="w-10 h-1 bg-emerald-200 rounded"></div>
    <div id="dot-2" class="step-dot w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold">2</div>
    <div class="w-10 h-1 bg-gray-200 rounded"></div>
    <div id="dot-3" class="step-dot w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold">3</div>
  </div>
  <div id="step-1" class="w-full max-w-sm">
    <h2 class="text-xl font-bold text-emerald-800 mb-1">给你的陪伴取个名字吧</h2>
    <p class="text-sm text-gray-500 mb-6">以后 TA 就叫这个名字陪着你</p>
    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-2">陪伴的名字</label>
      <input id="ai-name" type="text" placeholder="小暖" maxlength="6" class="w-full border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-300 bg-white"/>
    </div>
    <div class="mb-8">
      <label class="block text-sm text-gray-600 mb-2">你希望 TA 怎么称呼你？</label>
      <input id="user-nick" type="text" placeholder="朋友（随意填写）" maxlength="8" class="w-full border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-300 bg-white"/>
    </div>
    <button onclick="goStep(2)" class="btn-primary text-white w-full py-3 rounded-xl font-medium">下一步 →</button>
  </div>
  <div id="step-2" class="hidden w-full max-w-sm">
    <h2 class="text-xl font-bold text-emerald-800 mb-1">TA 是什么样的陪伴？</h2>
    <p class="text-sm text-gray-500 mb-4">选择最符合你期待的角色</p>
    <div class="grid grid-cols-2 gap-3 mb-6" id="role-btns">
      <button class="btn-secondary rounded-xl px-3 py-4 text-sm text-left" data-role="warm_friend" onclick="selectRole(this)"><div class="text-xl mb-1">🫂</div><div class="font-medium">暖心挚友</div><div class="text-xs text-gray-400 mt-1">温暖平等，像老朋友</div></button>
      <button class="btn-secondary rounded-xl px-3 py-4 text-sm text-left" data-role="gentle_confidant" onclick="selectRole(this)"><div class="text-xl mb-1">🌸</div><div class="font-medium">温柔知己</div><div class="text-xs text-gray-400 mt-1">细腻共情，深度倾听</div></button>
      <button class="btn-secondary rounded-xl px-3 py-4 text-sm text-left" data-role="energetic_buddy" onclick="selectRole(this)"><div class="text-xl mb-1">⚡</div><div class="font-medium">元气搭子</div><div class="text-xs text-gray-400 mt-1">活泼开朗，充满能量</div></button>
      <button class="btn-secondary rounded-xl px-3 py-4 text-sm text-left" data-role="calm_mentor" onclick="selectRole(this)"><div class="text-xl mb-1">🧘</div><div class="font-medium">沉稳陪伴</div><div class="text-xs text-gray-400 mt-1">理性冷静，给实用建议</div></button>
      <button class="btn-secondary rounded-xl px-3 py-4 text-sm text-left" data-role="healing_tree" onclick="selectRole(this)"><div class="text-xl mb-1">🌳</div><div class="font-medium">治愈树洞</div><div class="text-xs text-gray-400 mt-1">只是倾听，不评判</div></button>
      <button class="btn-secondary rounded-xl px-3 py-4 text-sm text-left" data-role="fun_playmate" onclick="selectRole(this)"><div class="text-xl mb-1">🎮</div><div class="font-medium">趣味玩伴</div><div class="text-xs text-gray-400 mt-1">幽默搞笑，轻松聊天</div></button>
    </div>
    <div class="flex gap-3">
      <button onclick="goStep(1)" class="btn-secondary flex-1 py-3 rounded-xl text-sm">← 上一步</button>
      <button onclick="goStep(3)" class="btn-primary text-white flex-1 py-3 rounded-xl font-medium">下一步 →</button>
    </div>
  </div>
  <div id="step-3" class="hidden w-full max-w-sm">
    <h2 class="text-xl font-bold text-emerald-800 mb-1">TA 应该怎么跟你说话？</h2>
    <p class="text-sm text-gray-500 mb-4">选择你喜欢的交互风格</p>
    <div class="grid grid-cols-2 gap-3 mb-4" id="style-btns">
      <button class="btn-secondary rounded-xl px-3 py-3 text-sm" data-style="warm" onclick="selectStyle(this)">🌸 温柔细腻</button>
      <button class="btn-secondary rounded-xl px-3 py-3 text-sm" data-style="energetic" onclick="selectStyle(this)">⚡ 活泼有力</button>
      <button class="btn-secondary rounded-xl px-3 py-3 text-sm" data-style="calm" onclick="selectStyle(this)">🧊 沉稳理性</button>
      <button class="btn-secondary rounded-xl px-3 py-3 text-sm" data-style="humor" onclick="selectStyle(this)">😂 幽默风趣</button>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-600 mb-2">回复长度偏好</label>
      <div class="flex gap-2">
        <button class="btn-secondary flex-1 rounded-xl py-2 text-sm" data-length="short" onclick="selectLength(this)">简短</button>
        <button class="btn-secondary selected flex-1 rounded-xl py-2 text-sm" data-length="normal" onclick="selectLength(this)">适中</button>
        <button class="btn-secondary flex-1 rounded-xl py-2 text-sm" data-length="detailed" onclick="selectLength(this)">详细</button>
      </div>
    </div>
    <div class="flex gap-3">
      <button onclick="goStep(2)" class="btn-secondary flex-1 py-3 rounded-xl text-sm">← 上一步</button>
      <button onclick="finishOnboard()" class="btn-primary text-white flex-1 py-3 rounded-xl font-medium">完成设定 🎉</button>
    </div>
  </div>
</div>

<div id="page-chat" class="hidden flex-col" style="height:100dvh;height:100vh;">
  <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-emerald-100 shadow-sm flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-lg">🌿</div>
      <div>
        <div id="chat-ai-name" class="font-bold text-emerald-800 text-sm">小暖</div>
        <div class="text-xs text-emerald-500">在线 · 随时陪伴</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="clearChat()" title="清空对话" class="text-gray-400 hover:text-red-400 p-2 rounded-lg hover:bg-red-50 transition-colors text-sm">🗑️</button>
      <button onclick="resetToWelcome()" class="text-xs text-gray-400 hover:text-emerald-600 px-3 py-1 rounded-full hover:bg-emerald-50 transition-colors">重设</button>
    </div>
  </div>
  <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4" style="min-height:0;"></div>
  <div class="px-4 py-3 bg-white border-t border-emerald-100 flex-shrink-0">
    <div class="flex items-end gap-2">
      <textarea id="msg-input" rows="1" placeholder="说说你的心情…"
        class="flex-1 border border-emerald-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-300 resize-none text-sm leading-6 max-h-32 bg-white"
        onkeydown="handleEnter(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" class="btn-primary text-white w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0 text-xl">➤</button>
    </div>
    <p class="text-center text-xs text-gray-300 mt-2">AI陪伴，仅供情绪支持，不替代专业心理咨询</p>
  </div>
</div>

<script>
const API_BASE = 'https://healing-agent-api.onrender.com/api';
let profile = { ai_name:'小暖', role_template:'warm_friend', gender_feel:'none', age_feel:'youth', personality_tags:[], user_nickname:'朋友', companion_style:'warm', reply_length:'normal', address_mode:'nickname', custom_address:'', emoji_habit:'sometimes', focus_scenarios:['emotional'], proactive_level:'moderate', proactive_behaviors:['check_mood'], sleep_mode:false, preferred_topics:[], forbidden_topics:[], custom_forbidden_words:[], forbidden_phrases:[], emotion_sensitivity:'medium', ai_catchphrase:'' };
let sessionId = localStorage.getItem('healing_session_id');
if (!sessionId) { sessionId = 'guest_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('healing_session_id', sessionId); }
let selectedRole = null, selectedStyle = null, selectedLength = 'normal', isLoading = false;

function showPage(id) {
  ['page-welcome','page-onboard','page-chat'].forEach(p => { const el = document.getElementById(p); el.classList.add('hidden'); el.classList.remove('flex'); });
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.classList.add('flex');
}

function goStep(n) {
  [1,2,3].forEach(i => { document.getElementById('step-'+i).classList.add('hidden'); const d = document.getElementById('dot-'+i); d.classList.remove('bg-emerald-500','text-white'); d.classList.add('bg-gray-200','text-gray-400'); });
  document.getElementById('step-'+n).classList.remove('hidden');
  const a = document.getElementById('dot-'+n); a.classList.remove('bg-gray-200','text-gray-400'); a.classList.add('bg-emerald-500','text-white');
}

function selectRole(btn) { document.querySelectorAll('#role-btns button').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedRole = btn.dataset.role; }
function selectStyle(btn) { document.querySelectorAll('#style-btns button').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedStyle = btn.dataset.style; }
function selectLength(btn) { document.querySelectorAll('[data-length]').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedLength = btn.dataset.length; }

function finishOnboard() {
  profile.ai_name = document.getElementById('ai-name').value.trim() || '小暖';
  profile.user_nickname = document.getElementById('user-nick').value.trim() || '朋友';
  if (selectedRole) profile.role_template = selectedRole;
  if (selectedStyle) profile.companion_style = selectedStyle;
  profile.reply_length = selectedLength;
  localStorage.setItem('healing_profile', JSON.stringify(profile));
  startChat();
}

function quickStart() {
  const saved = localStorage.getItem('healing_profile');
  if (saved) { try { profile = Object.assign({}, profile, JSON.parse(saved)); } catch(e){} }
  startChat();
}

function startChat() {
  document.getElementById('chat-ai-name').textContent = profile.ai_name;
  showPage('page-chat');
  const h = new Date().getHours();
  let g = h>=5&&h<12 ? '早上好～ 我是'+profile.ai_name+'，今天心情怎么样？' : h>=12&&h<18 ? '下午好！我是'+profile.ai_name+'，有什么想聊的吗？' : h>=18&&h<22 ? '晚上好～ 我是'+profile.ai_name+'，今天还顺利吗？' : '深夜了还没睡呀～ 我是'+profile.ai_name+'，有什么心事吗？';
  appendMessage('ai', g);
}

function appendMessage(role, text, emotion) {
  const c = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
  const em = {anxious:'😟',sad:'😢',angry:'😤',tired:'😴',helpless:'😔',confused:'😕',happy:'😊',calm:'🙂'};
  if (role === 'user') {
    d.innerHTML = '<div class="chat-bubble-user text-white px-4 py-3 max-w-xs text-sm leading-relaxed">'+escHtml(text)+'</div>';
  } else {
    const emo = emotion ? '<span class="text-xs ml-2">'+(em[emotion]||'')+'</span>' : '';
    d.innerHTML = '<div class="flex items-end gap-2 max-w-xs"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-sm flex-shrink-0">🌿</div><div class="chat-bubble-ai px-4 py-3 text-sm leading-relaxed text-gray-700">'+escHtml(text)+emo+'</div></div>';
  }
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('chat-messages');
  const d = document.createElement('div'); d.id='typing-indicator'; d.className='flex justify-start';
  d.innerHTML = '<div class="flex items-end gap-2"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-sm flex-shrink-0">🌿</div><div class="chat-bubble-ai px-4 py-3 flex gap-1 items-center"><div class="typing-dot w-2 h-2"></div><div class="typing-dot w-2 h-2"></div><div class="typing-dot w-2 h-2"></div></div></div>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function removeTyping() { const e = document.getElementById('typing-indicator'); if(e) e.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  appendMessage('user', text);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch(API_BASE+'/chat/guest', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:sessionId, message:text, profile}) });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    removeTyping();
    appendMessage('ai', data.reply, data.emotion);
  } catch(err) {
    removeTyping();
    appendMessage('ai', '哎呀，连不上服务器了，稍等一下再试试？ 😅');
    console.error(err);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleEnter(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,128)+'px'; }
function clearChat() {
  if (!confirm('确定要清空对话记录吗？')) return;
  document.getElementById('chat-messages').innerHTML = '';
  fetch(API_BASE+'/chat/guest/'+sessionId, {method:'DELETE'}).catch(()=>{});
  sessionId = 'guest_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  localStorage.setItem('healing_session_id', sessionId);
  appendMessage('ai', '对话已清空，重新开始～ 有什么想聊的吗？');
}
function resetToWelcome() { showPage('page-welcome'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br/>'); }

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('healing_profile');
  if (saved) { try { profile = Object.assign({}, profile, JSON.parse(saved)); } catch(e){} }
  showPage('page-welcome');
});
</script>
</body>
</html>
